<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Assistant Platform</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 900px;
      margin: 64px auto;
      padding: 24px;
      text-align: center;
    }
    h1 {
      margin-bottom: 8px;
      font-size: 2rem;
    }
    p {
      margin-bottom: 24px;
      font-size: 1.05rem;
      color: #4b5563;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      color: #111827;
      background: white;
    }
    a.primary {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>AI Assistant Platform</h1>
    <p>Сервис для парсинга документов, разбиения на чанки и поиска по данным.</p>
    <div class="actions">
      <a class="primary" href="/manual-test/">Open manual test page</a>
      <a href="/admin/">Open Django admin</a>
    </div>
  </main>
</body>
</html>
